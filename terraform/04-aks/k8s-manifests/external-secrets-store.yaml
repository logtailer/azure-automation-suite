apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault-store
  namespace: platform
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://kv-platform-prod.vault.azure.net
      serviceAccountRef:
        name: external-secrets-sa
        namespace: platform
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault-cluster-store
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://kv-platform-prod.vault.azure.net
      serviceAccountRef:
        name: external-secrets-sa
        namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-db-credentials
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: SecretStore
  target:
    name: platform-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: postgresql-connection-string
    - secretKey: DB_PASSWORD
      remoteRef:
        key: postgresql-admin-password
