apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: platform-api-http-scaler
  namespace: platform
spec:
  hosts:
    - api.platform.example.com
  pathPrefixes:
    - /api/
  scaleTargetRef:
    deployment: platform-api
    service: platform-api
    port: 8080
  replicas:
    min: 2
    max: 30
  scaledownPeriod: 300
  targetPendingRequests: 100
