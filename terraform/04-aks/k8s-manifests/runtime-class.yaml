apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-containers
handler: kata-qemu
overhead:
  podFixed:
    memory: 160Mi
    cpu: 250m
scheduling:
  nodeClassSelector:
    matchLabels:
      kata-containers: "true"
  tolerations:
    - key: kata-containers
      operator: Equal
      value: "true"
      effect: NoSchedule
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
overhead:
  podFixed:
    memory: 80Mi
    cpu: 100m
scheduling:
  nodeClassSelector:
    matchLabels:
      sandbox: gvisor
