apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: platform-workers
spec:
  template:
    metadata:
      labels:
        role: platform-worker
    spec:
      nodeClassRef:
        apiVersion: karpenter.azure.com/v1alpha2
        kind: AKSNodeClass
        name: platform-node-class
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: karpenter.azure.com/sku-family
          operator: In
          values: ["D", "E"]
        - key: karpenter.azure.com/sku-cpu
          operator: In
          values: ["4", "8", "16"]
      taints:
        - key: karpenter.sh/not-ready
          effect: NoSchedule
  limits:
    cpu: "200"
    memory: 400Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
    expireAfter: 720h
