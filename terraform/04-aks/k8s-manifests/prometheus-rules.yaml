apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alerting-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: platform.node
      interval: 30s
      rules:
        - alert: NodeCPUHigh
          expr: |
            (1 - avg(irate(node_cpu_seconds_total{mode="idle"}[5m])) by (node)) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} CPU above 85%"
            description: "CPU utilisation is {{ $value | humanize }}% for more than 10 minutes."

        - alert: NodeMemoryPressure
          expr: |
            (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} memory below 10%"
            description: "Available memory is {{ $value | humanize }}%."

    - name: platform.pods
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} has restarted {{ $value }} times in 15 minutes."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="false"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for 15 minutes"
