apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: platform-api-destination
  namespace: platform
spec:
  host: platform-api.platform.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 200
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: platform-api-vs
  namespace: platform
spec:
  hosts:
    - platform-api.platform.svc.cluster.local
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "gateway-error,connect-failure,retriable-4xx"
      route:
        - destination:
            host: platform-api.platform.svc.cluster.local
            port:
              number: 8080
