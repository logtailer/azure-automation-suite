apiVersion: v1
kind: Namespace
metadata:
  name: flux-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    app.kubernetes.io/part-of: flux
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: platform-infra
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/org/azure-automation-suite
  ref:
    branch: main
  secretRef:
    name: flux-git-credentials
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-manifests
  namespace: flux-system
spec:
  interval: 5m
  path: ./terraform/04-aks/k8s-manifests
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-infra
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: platform-api
      namespace: platform
  timeout: 3m
