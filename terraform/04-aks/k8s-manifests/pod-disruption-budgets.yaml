apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-api-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: platform-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-worker-pdb
  namespace: default
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: platform-worker
