apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: jwt-authn
  namespace: platform
spec:
  selector:
    matchLabels:
      app: platform-api
  url: oci://ghcr.io/tetratelabs/wasm-extensions/jwt-authn:1.0.0
  pluginConfig:
    jwks_uri: "https://login.microsoftonline.com/common/discovery/v2.0/keys"
    audiences:
      - "api://platform-api"
    forward_jwt_payload_header: "x-jwt-payload"
  phase: AUTHN
  priority: 10
---
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: rate-limit
  namespace: platform
spec:
  selector:
    matchLabels:
      app: platform-api
  url: oci://ghcr.io/tetratelabs/wasm-extensions/ratelimit:1.0.0
  pluginConfig:
    limit_rps: 1000
    burst_size: 200
    key_type: "remote_address"
  phase: STATS
  priority: 20
