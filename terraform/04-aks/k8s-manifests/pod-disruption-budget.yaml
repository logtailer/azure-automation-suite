apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-api-pdb
  namespace: platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: platform-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-worker-pdb
  namespace: platform
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: platform-worker
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: monitoring-pdb
  namespace: monitoring
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
