apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: platform-api-rollout
  namespace: platform
spec:
  replicas: 4
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      containers:
        - name: platform-api
          image: platform-api:latest
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
  strategy:
    canary:
      canaryService: platform-api-canary
      stableService: platform-api-stable
      trafficRouting:
        istio:
          virtualService:
            name: platform-api-vs
            routes:
              - primary
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - analysis:
            templates:
              - templateName: success-rate
        - setWeight: 30
        - pause: { duration: 5m }
        - setWeight: 60
        - pause: { duration: 5m }
        - setWeight: 100
