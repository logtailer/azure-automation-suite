name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Find all Terraform modules
        id: find
        run: |
          find . -type f -name "main.tf" -exec dirname {} \; | sort -u > tf_dirs.txt
          echo "Modules found:"
          cat tf_dirs.txt

      - name: terraform fmt check
        run: |
          while read dir; do
            echo "→ fmt $dir"
            terraform -chdir="$dir" fmt -check -recursive
          done < tf_dirs.txt

      - name: terraform validate
        run: |
          while read dir; do
            echo "→ validate $dir"
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done < tf_dirs.txt

  verify-shell:
    name: Shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all .sh files
        run: |
          find scripts/ -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning

  verify-python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on all Python files
        run: |
          find . -name "*.py" \
            -not -path "./.terraform/*" \
            -not -path "./.git/*" \
            -print0 \
            | xargs -0 ruff check --output-format=github

  verify-yaml:
    name: YAML / k8s manifests (yamllint + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint — workflow and config files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}}}" \
            .github/workflows/ \
            terraform/04-aks/k8s-manifests/

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin/

      - name: kubeconform — k8s manifests
        run: |
          find terraform/04-aks/k8s-manifests/ -name "*.yaml" -print0 \
            | xargs -0 kubeconform \
                -strict \
                -ignore-missing-schemas \
                -summary \
                -kubernetes-version 1.31.0
