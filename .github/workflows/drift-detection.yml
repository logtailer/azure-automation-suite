name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        module:
          - 01-foundation
          - 02-networking
          - 03-security
          - 04-aks
          - 05-observability
          - 06-cicd
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: terraform/${{ matrix.module }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform plan
        id: plan
        working-directory: terraform/${{ matrix.module }}
        run: |
          set +e
          terraform plan -detailed-exitcode -var-file=prod.tfvars \
            -out=tfplan 2>&1 | tee plan-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Open drift issue
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(
              'terraform/${{ matrix.module }}/plan-output.txt', 'utf8'
            );
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'terraform-drift',
              state: 'open',
            });
            const title = `[Drift] ${{ matrix.module }} has unmanaged infrastructure changes`;
            const alreadyOpen = existing.data.some(i => i.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  '## Terraform Drift Detected',
                  '',
                  `**Module**: \`${{ matrix.module }}\``,
                  `**Detected**: ${new Date().toISOString()}`,
                  `**Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  '<details><summary>Plan output (first 8 kB)</summary>',
                  '',
                  '```',
                  output.slice(0, 8000),
                  '```',
                  '',
                  '</details>',
                ].join('\n'),
                labels: ['terraform-drift', 'infrastructure'],
              });
            }
