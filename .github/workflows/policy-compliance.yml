name: Azure Policy Compliance Check

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      scope:
        description: "Subscription or management group ID to check"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  compliance-check:
    name: Evaluate policy compliance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Trigger compliance evaluation
        run: |
          SCOPE="${{ github.event.inputs.scope || secrets.AZURE_SUBSCRIPTION_ID }}"
          az policy state trigger-scan --resource-group "" --no-wait || true
          echo "Compliance scan triggered for scope: $SCOPE"

      - name: Export non-compliant resources
        run: |
          az policy state list \
            --filter "complianceState eq 'NonCompliant'" \
            --query "[].{Resource:resourceId,Policy:policyDefinitionName,State:complianceState}" \
            -o table | tee compliance-report.txt
          NON_COMPLIANT=$(az policy state summarize \
            --query "results.nonCompliantResources" -o tsv)
          echo "Non-compliant resources: $NON_COMPLIANT"
          echo "NON_COMPLIANT=$NON_COMPLIANT" >> "$GITHUB_ENV"

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.txt
          retention-days: 30

      - name: Fail on critical non-compliance
        if: env.NON_COMPLIANT != '0' && env.NON_COMPLIANT != ''
        run: |
          echo "::warning::$NON_COMPLIANT non-compliant resources found. See artifact for details."
