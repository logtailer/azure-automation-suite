name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further updates are made.
          stale-pr-message: >
            This pull request has been automatically marked as stale due to inactivity.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            This issue has been closed due to inactivity. Please reopen if this is still relevant.
          close-pr-message: >
            This pull request has been closed due to inactivity. Please reopen if you intend to continue.
          days-before-issue-stale: 30
          days-before-pr-stale: 21
          days-before-issue-close: 14
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security,do-not-close
          remove-stale-when-updated: true
