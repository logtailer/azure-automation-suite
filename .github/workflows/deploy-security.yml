name: Deploy Security

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, staging, prod]
        default: dev

jobs:
  deploy-dev:
    if: inputs.environment == 'dev'
    uses: ./.github/workflows/reusable-terraform-deploy.yml
    with:
      module: 03-security
      environment: dev
    secrets: inherit

  deploy-staging:
    if: inputs.environment == 'staging'
    uses: ./.github/workflows/reusable-terraform-deploy.yml
    with:
      module: 03-security
      environment: staging
    secrets: inherit

  deploy-prod:
    if: inputs.environment == 'prod'
    needs: [deploy-staging]
    uses: ./.github/workflows/reusable-terraform-deploy.yml
    with:
      module: 03-security
      environment: prod
    secrets: inherit
