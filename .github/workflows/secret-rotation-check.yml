name: Secret Rotation Check

on:
  schedule:
    - cron: '0 9 1 * *'  # 1st of every month at 09:00 UTC
  workflow_dispatch:

jobs:
  check-rotation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check secret ages
        run: |
          VAULT="${{ secrets.KEY_VAULT_NAME }}"
          echo "Checking secret ages in vault: $VAULT"
          az keyvault secret list --vault-name "$VAULT" \
            --query "[].{name:name, updated:attributes.updated}" \
            --output table

          STALE=$(az keyvault secret list --vault-name "$VAULT" \
            --query "[?attributes.updated < '$(date -d '90 days ago' -u +%Y-%m-%dT%H:%M:%SZ)'].name" \
            --output tsv 2>/dev/null || true)

          if [ -n "$STALE" ]; then
            echo "::warning::Secrets older than 90 days: $STALE"
          else
            echo "All secrets rotated within 90 days."
          fi
