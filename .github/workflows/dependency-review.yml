name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Scan for vulnerable dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0
          comment-summary-in-pr: always
          warn-on-openssf-scorecard-level: 3

      - name: Terraform provider version check
        run: |
          find terraform -name "versions.tf" -o -name "main.tf" | xargs grep -h 'version\s*=' \
            | grep -v '#' | sort -u | head -30
