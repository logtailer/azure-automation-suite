name: Certificate Expiry Check

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      warn_days:
        description: "Warn when certificate expires within N days"
        required: false
        default: "30"
      hosts:
        description: "Comma-separated public hostnames to check"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  check-certs:
    name: Check certificate expiry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run expiry check
        id: check
        run: |
          ARGS="--vault ${{ secrets.KEY_VAULT_NAME }} --warn-days ${{ github.event.inputs.warn_days || '30' }}"
          HOSTS="${{ github.event.inputs.hosts || secrets.MONITORED_HOSTNAMES }}"
          [[ -n "$HOSTS" ]] && ARGS="$ARGS --hosts $HOSTS"
          bash scripts/check-certificate-expiry.sh $ARGS 2>&1 | tee cert-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cert-expiry-report
          path: cert-report.txt
          retention-days: 30

      - name: Open issue on expiry warning
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('cert-report.txt', 'utf8');
            const title = `Certificate expiry warning — ${new Date().toISOString().split('T')[0]}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cert-expiry'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## Certificate Expiry Warning\n\n\`\`\`\n${report}\n\`\`\``,
                labels: ['cert-expiry', 'security']
              });
            }
