name: Notify on Workflow Failure

on:
  workflow_run:
    workflows:
      - "Terraform CI"
      - "Deploy to AKS"
      - "Security Scanning"
      - "Load Tests"
      - "Chaos Engineering Tests"
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  notify:
    name: Send failure notification
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Build notification payload
        id: payload
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"
          echo "workflow=$WORKFLOW" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL"   >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"     >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR"       >> "$GITHUB_OUTPUT"

      - name: Send Teams notification
        if: secrets.TEAMS_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "themeColor": "FF0000",
              "summary": "Workflow failed",
              "title": "❌ Workflow Failed: ${{ steps.payload.outputs.workflow }}",
              "sections": [{
                "facts": [
                  { "name": "Branch", "value": "${{ steps.payload.outputs.branch }}" },
                  { "name": "Triggered by", "value": "${{ steps.payload.outputs.actor }}" },
                  { "name": "Status", "value": "failure" }
                ],
                "potentialAction": [{
                  "@type": "OpenUri",
                  "name": "View Run",
                  "targets": [{ "os": "default", "uri": "${{ steps.payload.outputs.run_url }}" }]
                }]
              }]
            }'

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": ":x: *${{ steps.payload.outputs.workflow }}* failed on `${{ steps.payload.outputs.branch }}`",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Triggered by", "value": "${{ steps.payload.outputs.actor }}", "short": true },
                  { "title": "Run", "value": "<${{ steps.payload.outputs.run_url }}|View Details>", "short": true }
                ]
              }]
            }'
