name: AKS Kubernetes Upgrade

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "AKS cluster name"
        required: true
      resource_group:
        description: "Resource group containing the AKS cluster"
        required: true
      target_version:
        description: "Target Kubernetes version (e.g. 1.31.0)"
        required: true
      environment:
        description: "Environment (dev, staging, prod)"
        required: true
        default: "dev"

permissions:
  id-token: write
  contents: read

jobs:
  pre-upgrade-check:
    name: Pre-upgrade validation
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.check.outputs.current_version }}
      upgrade_available: ${{ steps.check.outputs.upgrade_available }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check current version and available upgrades
        id: check
        run: |
          CURRENT=$(az aks show \
            --name "${{ github.event.inputs.cluster_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query "kubernetesVersion" -o tsv)
          echo "Current version: $CURRENT"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"

          AVAILABLE=$(az aks get-upgrades \
            --name "${{ github.event.inputs.cluster_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query "agentPoolProfiles[0].upgrades[?kubernetesVersion=='${{ github.event.inputs.target_version }}'].kubernetesVersion" \
            -o tsv)
          if [[ -n "$AVAILABLE" ]]; then
            echo "upgrade_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "upgrade_available=false" >> "$GITHUB_OUTPUT"
            echo "::error::Target version ${{ github.event.inputs.target_version }} not available"
            exit 1
          fi

  upgrade:
    name: Upgrade AKS cluster
    runs-on: ubuntu-latest
    needs: pre-upgrade-check
    if: needs.pre-upgrade-check.outputs.upgrade_available == 'true'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upgrade control plane
        run: |
          az aks upgrade \
            --name "${{ github.event.inputs.cluster_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --kubernetes-version "${{ github.event.inputs.target_version }}" \
            --control-plane-only \
            --yes

      - name: Upgrade node pools
        run: |
          NODE_POOLS=$(az aks nodepool list \
            --cluster-name "${{ github.event.inputs.cluster_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query "[].name" -o tsv)
          for POOL in $NODE_POOLS; do
            echo "Upgrading node pool: $POOL"
            az aks nodepool upgrade \
              --cluster-name "${{ github.event.inputs.cluster_name }}" \
              --resource-group "${{ github.event.inputs.resource_group }}" \
              --name "$POOL" \
              --kubernetes-version "${{ github.event.inputs.target_version }}" \
              --no-wait
          done

      - name: Verify upgrade
        run: |
          az aks show \
            --name "${{ github.event.inputs.cluster_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query "{Version:kubernetesVersion,State:provisioningState}" \
            -o table
